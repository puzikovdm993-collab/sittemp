<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Название приложения -->
    <title>WTIS</title>

    <!-- Подключаем CSS-файл LiteGraph.js для стилизации узлов и связей -->
    <link rel="stylesheet" type="text/css" href="static/css/litegraph.css">
    <link rel="stylesheet" href="styles/workflow.css">
</head>
<body>
    <main class="app">



        <!-- Основная область -->
        <div class="main-content" id="mainContent">

            <!-- Боковая панель (сайдбар) -->
            <aside class="sidebar" id="sidebar">

                <!-- Кнопка сворачивания -->
                <button class="collapse-btn" onclick="toggleSidebar()">
                    <span id="collapseIcon">←</span>
                </button>

                <!-- Информация о пользователе -->
                <div class="user-section">
                    <div class="avatar">AI</div>
                    <div class="user-info">
                        <div class="user-name">TIS_user</div>
                        <div class="user-role">Senior Developer</div>
                    </div>
                </div>

                <!-- Поиск -->
                <div class="search-container">
                    <input type="text" id="searchInput" placeholder="Поиск узлов..." autocomplete="off">
                    <svg class="search-icon" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
                </div>

                <div class="node-list">
                    <!-- Группа: Ввод/Вывод -->
                    <div class="node-group">
                        <div class="node-group-header" onclick="toggleGroup(this)">Ввод/Вывод</div>
                        <div class="node-group-content">
                            <div class="node-card" draggable="true" data-node-type="input/LoadNode">
                                <svg><use href="#icon-download"></use></svg>
                                <div class="node-text-container">
                                    <div>Загрузить</div>
                                    <!-- <small>Входной узел</small> -->
                                </div>
                            </div>
                            <div class="node-card" draggable="true" data-node-type="output/SaveNode">
                                <svg><use href="#icon-upload"></use></svg>
                                <div class="node-text-container">
                                    <div>Сохранить</div>
                                    <!-- <small>Выходной узел</small> -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Группа: Filters -->
                    <div class="node-group">
                        <div class="node-group-header" onclick="toggleGroup(this)">Фильтры</div>
                        <div class="node-group-content">
                            <div class="node-card" draggable="true" data-node-type="filter/Sobel">
                                <svg><use href="#lucide-eye"></use></svg>
                                <div class="node-text-container">
                                    <div>Фильтр собель</div>
                                    <!-- <small>Фильтр серого</small> -->
                                </div>
                            </div>
                            <div class="node-card" draggable="true" data-node-type="filter/Median">
                                <svg><use href="#lucide-invert"></use></svg>
                                <div class="node-text-container">
                                    <div>Медианный фильтр</div>
                                    <!-- <small>Инверсия цвета</small> -->
                                </div>
                            </div>
                            <div class="node-card" draggable="true" data-node-type="filter/Normalisation">
                                <svg><use href="#lucide-sliders-horizontal"></use></svg>
                                <div class="node-text-container">
                                    <div>Нормализация</div>
                                    <!-- <small>Изменить яркость</small> -->
                                </div>
                            </div>
                            <div class="node-card" draggable="true" data-node-type="filter/BackgroundCorrectionPolynomialNode">
                                <svg><use href="#lucide-sliders-horizontal"></use></svg>
                                <div class="node-text-container">
                                    <div>Апроксимация</div>
                                    <!-- <small>Изменить яркость</small> -->
                                </div>
                            </div>
                           
                            <div class="node-card" draggable="true" data-node-type="filter/Logarithm">
                                <svg><use href="#lucide-sliders-horizontal"></use></svg>
                                <div class="node-text-container">
                                    <div>Логарифмирование</div>
                                    <!-- <small>Изменить яркость</small> -->
                                </div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Группа: Transform -->
                    <div class="node-group">
                        <div class="node-group-header" onclick="toggleGroup(this)">Трансформ</div>
                        <div class="node-group-content">
                            <div class="node-card" draggable="true" data-node-type="transform/Resize">
                                <svg><use href="#lucide-eye"></use></svg>
                                <div class="node-text-container">
                                    <div>Размер</div>
                                    <!-- <small>Вывод в превью</small> -->
                                </div>
                            </div>
                            
                            <div class="node-card" draggable="true" data-node-type="transform/Rotate">
                                <svg><use href="#lucide-download"></use></svg>
                                <div class="node-text-container">
                                    <div>Поворот</div>
                                    <!-- <small>Выходной узел</small> -->
                                </div>
                            </div>
                            <div class="node-card" draggable="true" data-node-type="transform/Crop">
                                <svg><use href="#lucide-download"></use></svg>
                                <div class="node-text-container">
                                    <div>Обрезка</div>
                                    <!-- <small>Выходной узел</small> -->
                                </div>
                            </div>
                            <div class="node-card" draggable="true" data-node-type="transform/Threshold">
                                <svg><use href="#lucide-download"></use></svg>
                                <div class="node-text-container">
                                    <div>Порог</div>
                                    <!-- <small>Выходной узел</small> -->
                                </div>
                            </div>
                            
                            <div class="node-card" draggable="true" data-node-type="transform/CoordinateTransformNode">
                                <svg><use href="#lucide-download"></use></svg>
                                <div class="node-text-container">
                                    <div>Полярные координаты</div>
                                    <!-- <small>Выходной узел</small> -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Группа: Calculation -->
                    <div class="node-group">
                        <div class="node-group-header" onclick="toggleGroup(this)">Калькулятор</div>
                        <div class="node-group-content">
                            <div class="node-card" draggable="true" data-node-type="Calculation/Difference">
                                <svg><use href="#lucide-eye"></use></svg>
                                <div class="node-text-container">
                                    <div>Деление</div>
                                    <!-- <small>Вывод в превью</small> -->
                                </div>
                            </div>
                        </div>
                    </div>

                    <!-- Группа: ROI -->
                    <div class="node-group">
                        <div class="node-group-header" onclick="toggleGroup(this)">Выделение</div>
                        <div class="node-group-content">
                            <div class="node-card" draggable="true" data-node-type="roi/lasso">
                                <svg><use href="#lucide-eye"></use></svg>
                                <div class="node-text-container">
                                    <div>Лассо</div>
                                    <!-- <small>Вывод в превью</small> -->
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- Панель инструментов -->
            <header class="header">Workflow Редактирования Изображений</header>

            <div class="toolbar" id="toolbar">
                <button id="run">Запустить</button>
                <button id="export-graph">Экспорт JSON</button>
                <button id="import-graph">Импорт JSON</button>
                <button id="clear-graph">Очистить</button>

                <button class="clear-graph">
                    <a href="index.html" class="btn-link">Paint</a>
                </button>

            </div>

            <!-- Контейнер для LiteGraph -->
            <div id="workflow-layout">
                <div id="graph-container">
                    <canvas id="graph-canvas"></canvas>
                </div>
            </div>

            <aside class="inspector" id="inspector">
                <div class="preview" id="inspector-preview">
                    <div>Нет превью</div>
                </div>
                <div id="inspector-node-controls" style="margin-top:8px; display:flex; gap:8px; flex-wrap:wrap;"></div>
                <!-- <div id="inspector-actions" style="margin-top:10px; display:flex; gap:8px; flex-wrap:wrap; align-items:center;"></div>
                <div id="toast-container" aria-live="polite" aria-atomic="true"></div> -->
            </aside>

            <div class="preview-tooltip" id="previewTooltip">
                <!-- Содержимое тултипа -->
            </div>
        </div>
    </main>

    <!-- Всплывающие окна и модалки -->
    <div class="modal" id="imageModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 10000; justify-content: center; align-items: center;">
        <span class="close-modal" style="position: absolute; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer;">&times;</span>
        <img class="modal-content" id="modalImage" src="" alt="" style="max-width: 90%; max-height: 90%; border-radius: 8px;">
    </div>

    <!-- Модальное окно для редактирования узлов -->
    <div id="overlay"></div>
    <div id="modal">
        <div class="modal-header">
            <div class="modal-title" id="modal-title">Edit Node</div>
            <button class="close-btn" onclick="hideModal()">&times;</button>
        </div>
        <div class="modal-content" id="modal-content">
            <!-- Содержимое будет генерироваться динамически -->
        </div>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="hideModal()">Cancel</button>
            <button class="btn-save" onclick="saveNodeProperties()">Save</button>
        </div>
    </div>

        <symbol id="lucide-image" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></symbol>

    <!-- === ПОДКЛЮЧЕНИЕ БИБЛИОТЕК === -->
    <script src="static/js/litegraph.js"></script> <!-- Основная библиотека для создания графов узлов -->

    <script>


        // ========== ИНИЦИАЛИЗАЦИЯ ПРИ ЗАГРУЗКЕ ==========
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Супер-веб-страница загружается...');
            
            // Инициализация всех систем

            initTabs();

            
            // // Анимация загрузки
            // setTimeout(() => {
            //     document.querySelectorAll('.card').forEach((card, i) => {
            //         card.style.animation = `fadeInUp 0.5s ease ${i * 0.1}s both`;
            //     });
                
            //     // Разблокировать первое достижение
            //     unlockAchievement('firstVisit', 'Первый визит', 'Вы впервые посетили эту страницу', 'fas fa-door-open');
                
            //     // Показать приветственное уведомление
            //     showNotification('Добро пожаловать на супер-веб-страницу! 🚀', 'info', 5000);
            // }, 1000);
            
            console.log('✅ Все системы инициализированы!');
        });



        const previewTooltip = document.getElementById('previewTooltip');





        //alert('Ошибка: LiteGraph не загрузился. Проверьте соединение.');
        
        
        // ===================================================================
        // === 1. ИНИЦИАЛИЗАЦИЯ ГРАФА И ХОЛСТОВ ===
        // ===================================================================
        
        // Создаём объект графа — это основная структура, где хранятся узлы и связи
        const graph = new LiteGraph.LGraph();
        // Создаём холст для отрисовки графа. Указываем селектор #graph-canvas и передаём граф
        const graphCanvas = new LiteGraph.LGraphCanvas("#graph-canvas", graph);
        // Разрешает перетаскивание узлов
        graphCanvas.allow_dragnode = true;
        // Разрешает перенаправление соединений
        graphCanvas.allow_reconnect = true;


        // ===================================================================
        // === 2. ОПРЕДЕЛЕНИЕ УЗЛОВ ===
        // ===================================================================

        // Узел загрузки изображения
        class LoadNode extends LGraphNode  {
            constructor() {
                super();
                this.addOutput("Image", "object"); 
                // Свойства узла (по умолчанию)
                this.properties = {
                    "width": 10,
                    "height": 10,
                    "data": "[[0, 0, 0], [0, 255, 0], [0, 0, 0]]", // Начальная матрица (JSON-строка)
                    "minValue": 0,
                    "maxValue": 255,
                    "format": "tpt",
                    "filename": null,
                    "autoscale": true,
                    "colormap": "gray", // Цветовая схема
                    "previewData":null
                };
                this.size = [200, 60];
                this.resizable = false;
                this.color = "#66aaff"; // Светло-голубой для матриц
                this.title = "Загрузить";
            }

            //Метод `onExecute` вызывается при выполнении узла (например, при нажатии кнопки "Run")
            onExecute() {

                // Проверяем, есть ли загруженные данные в свойствах
                if (this.properties.data) {
                    
                    // Получаем матрицу с входа или из свойств
                    let matrix = this.properties.data;

                    const width = this.properties.width;
                    const height = this.properties.height;
                    const minVal =  this.properties.minValue;
                    const maxVal =  this.properties.maxValue;

                    const autoscale = true;
                    const colormap = 'gray';
                    const colorMap = getColormap(colormap);
                    const data = new Uint8ClampedArray(width * height * 4);
                    let dataIndex = 0;
                    for (let y = 0; y < height; y++) {
                        for (let x = 0; x < width; x++) {
                            const normalizedValue = autoscale 
                                ? (matrix[y][x] - minVal) / (maxVal - minVal + 1e-9) 
                                : (matrix[y][x] - scale[0]) / (scale[1] - scale[0] + 1e-9);
                            
                            const color = colorMap(Math.max(0, Math.min(1, normalizedValue)));
                            data[dataIndex++] = color.r * 255;
                            data[dataIndex++] = color.g * 255;
                            data[dataIndex++] = color.b * 255;
                            data[dataIndex++] = 255;
                        }
                    }
                    const canvas = document.createElement('canvas');
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    const imageData = new ImageData(data, width, height);
                    ctx.putImageData(imageData, 0, 0);

                    // **Сохраняем изображение в превью** (для визуализации)
                    this.properties.previewData = imageData;

                    // Формируем выходные данные
                    const outputData = {
                        width: this.properties.width,
                        height: this.properties.height,
                        data: this.properties.data,
                        minValue: this.properties.minValue,
                        maxValue: this.properties.maxValue,
                        format: this.properties.format,
                        filename: this.properties.filename,
                        autoscale: this.properties.autoscale,
                        colormap: this.properties.colormap
                    };

                    // Если есть, передаём его через выходной порт (индекс 0 — первый выход)
                    this.setOutputData(0, outputData);
                }
            }
            onDrawForeground(ctx) {
                if (this.properties.filename == null || this.properties.format == null) {
                    ctx.fillStyle = "#CCC";
                    ctx.font = "12px Arial";
                    ctx.fillText("LoadName:", 10, 42);
                    ctx.fillStyle = "#FFF";
                    ctx.fillText(`Файл не выбран`, 75, 42);
                    return;
                }
                ctx.fillStyle = "#CCC";
                ctx.font = "12px Arial";
                ctx.fillText("LoadName:", 10, 42);
                ctx.fillStyle = "#FFF";
                ctx.fillText(`${this.properties.filename}.${this.properties.format}`, 75, 42);
            }

            // Обработчик события клика на узел
            last_mousedown_time = 0;  // Время последнего нажатия
            is_dragging = false;      // Флаг перетаскивания
            drag_threshold = 5;       // Порог смещения (пиксели) для определения drag
            click_timeout = 200;      // Максимальное время для клика (мс)

            // Обработчик нажатия мыши (фиксация начала клика)
            onMouseDown(event, pos, graphcanvas) {
                this.last_mousedown_time = Date.now();
                this.is_dragging = false;
                
                // Проверяем, находится ли клик в области заголовка узла (первые NODE_TITLE_HEIGHT пикселей по оси Y)
                // Если да, возвращаем false, чтобы разрешить стандартное поведение (перетаскивание узла)
                if (pos[1] < LiteGraph.NODE_TITLE_HEIGHT) {
                    return false; // Разрешаем drag через заголовок
                }

                // Проверяем, не попал ли клик в область слота (input/output)
                // getSlotInPosition(pos) возвращает объект слота, если позиция совпадает с его областью
                const slot = this.getSlotInPosition(pos);
                if (slot !== null) {
                    return false; // Разрешаем стандартное поведение (подключение связей между слотами)
                }
                
                // Запоминаем начальную позицию для проверки drag
                this._start_pos = pos;
                return true; // Блокируем стандартное поведение (чтобы не начинался drag сразу)
                //return false; 
            }

            // Обработчик отпускания мыши (проверка клика или drag)
            onMouseUp(event, pos, graphcanvas) {
                if (!this._start_pos) return false; // Если не было начального клика
                
                const time_difference = Date.now() - this.last_mousedown_time;
                const drag_difference = [
                    Math.abs(pos[0] - this._start_pos[0]),
                    Math.abs(pos[1] - this._start_pos[1])
                ];
                
                // Если прошло слишком много времени (drag) или было значительное смещение — это перетаскивание
                if (time_difference > this.click_timeout || 
                    drag_difference[0] > this.drag_threshold || 
                    drag_difference[1] > this.drag_threshold) {
                    this.is_dragging = true;
                    this._start_pos = null; // Сброс для следующего клика
                    return true; // Разрешаем стандартное перетаскивание
                }
                
                // Иначе — это короткий клик (отображаем настройки)
                showNodeModal(this);
                this._start_pos = null; // Сброс для следующего клика

                        const color = colorMap(Math.max(0, Math.min(1, normalizedValue)));

                        data[dataIndex++] = color.g * 255;
                        data[dataIndex++] = color.b * 255;

                var min_result = matrix[0][0];
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {

                        if(matrix[y][x] > max_result) {
                            max_result = matrix[y][x];
                        }
                        if(matrix[y][x] < min_result) {
                            min_result = matrix[y][x];
                        }
                    }

                else   {

                    const mimeTypes = {
                        'png': 'image/png',

                        'jpeg': 'image/jpeg',
                        'webp': 'image/webp',
                        'gif': 'image/gif',
                        'bmp': 'image/bmp'
                    };

                    // Сохраняем с нужным форматом

                    a.download =  this.properties.filename;
                    a.href = canvas.toDataURL(mimeType); // 🔥 Теперь формат учитывается!

            drag_threshold = 5;       // Порог смещения (пиксели) для определения drag
            click_timeout = 200;      // Максимальное время для клика (мс)

            // Обработчик нажатия мыши (фиксация начала клика)
            onMouseDown(event, pos, graphcanvas) {
                this.last_mousedown_time = Date.now();
                this.is_dragging = false;
                
                // Проверяем, находится ли клик в области заголовка узла (первые NODE_TITLE_HEIGHT пикселей по оси Y)
                // Если да, возвращаем false, чтобы разрешить стандартное поведение (перетаскивание узла)
                if (pos[1] < LiteGraph.NODE_TITLE_HEIGHT) {
                    return false; // Разрешаем drag через заголовок
                }

                // Проверяем, не попал ли клик в область слота (input/output)
                // getSlotInPosition(pos) возвращает объект слота, если позиция совпадает с его областью
                const slot = this.getSlotInPosition(pos);
                if (slot !== null) {
                    return false; // Разрешаем стандартное поведение (подключение связей между слотами)
                }
                
                // Запоминаем начальную позицию для проверки drag
                this._start_pos = pos;
                return true; // Блокируем стандартное поведение (чтобы не начинался drag сразу)
                //return false; 
            }

            // Обработчик отпускания мыши (проверка клика или drag)
            onMouseUp(event, pos, graphcanvas) {
                if (!this._start_pos) return false; // Если не было начального клика
                
                const time_difference = Date.now() - this.last_mousedown_time;
                const drag_difference = [
                    Math.abs(pos[0] - this._start_pos[0]),
                    Math.abs(pos[1] - this._start_pos[1])
                ];
                
                // Если прошло слишком много времени (drag) или было значительное смещение — это перетаскивание
                if (time_difference > this.click_timeout || 
                    drag_difference[0] > this.drag_threshold || 
                    drag_difference[1] > this.drag_threshold) {
                    this.is_dragging = true;
                    this._start_pos = null; // Сброс для следующего клика
                    return true; // Разрешаем стандартное перетаскивание
                }
                
                // Иначе — это короткий клик (отображаем настройки)
                showNodeModal(this);
                this._start_pos = null; // Сброс для следующего клика
                return true; // Событие обработано
            }

            // Обработчик движения мыши (для drag)

                        Math.abs(pos[0] - this._start_pos[0]),
                        Math.abs(pos[1] - this._start_pos[1])
                    ];

        class Sobel extends FilterNode {
            constructor() {
                super();
                this.title = "Собель (границы)";
                this.size[0] = 200; 
            }

            onExecute() {

                const matrixInput = this.getInputData(0);
                if (!matrixInput) {
                    console.warn("Входные данные матрицы отсутствуют");
                    return;
                }

                // Валидация входных данных
                if (!Array.isArray(matrixInput.data) || matrixInput.data.length === 0) {
                    console.error("Некорректные входные данные: матрица пустая или не массив");
                    return;
                }

                const width = matrixInput.width;
                const height = matrixInput.height;
                const matrix = matrixInput.data;

                const result = { data: new Array(height).fill(0).map(() => new Array(width).fill(0)) };

                // Ядра Собеля для вычисления градиентов
                const sobelKernels = {
                    // Горизонтальный градиент
                    gx: [[-1, 0, 1], [-2, 0, 2], [-1, 0, 1]], 
                    // Вертикальный градиент
                    gy: [[-1, -2, -1], [0, 0, 0], [1, 2, 1]]   
                };


                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        let gxSum = 0, gySum = 0;
                        // Применяем свёртку (3x3 окно)
                        for (let ky = -1; ky <= 1; ky++) {
                            for (let kx = -1; kx <= 1; kx++) {
                                const px = x + kx;
                                const py = y + ky;

                                // Проверка границ
                                if (px >= 0 && px < width && py >= 0 && py < height) {
                                    // Вклад в градиенты
                                    gxSum += matrix[py][px] * sobelKernels.gx[ky + 1][kx + 1];
                                    gySum += matrix[py][px] * sobelKernels.gy[ky + 1][kx + 1];
                                }
                            }
                        }
                        result.data[y][x] = Math.sqrt(gxSum * gxSum + gySum * gySum);
                    }
                }

                this.properties.width = width;
                this.properties.height = height;
                this.properties.data = result.data;
                this.properties.minValue = matrixInput.minValue;
                this.properties.maxValue = matrixInput.maxValue;
                this.properties.autoscale = matrixInput.autoscale;
                this.properties.colormap = matrixInput.colormap;
                this.properties.filename = matrixInput.filename;
                this.properties.format = matrixInput.format;

                // Формируем выходные данные
                const outputData = {
                    width: this.properties.width,
                    height: this.properties.height,
                    data: this.properties.data,
                    minValue: this.properties.minValue,
                    maxValue: this.properties.maxValue,
                    format: this.properties.format,
                    filename: this.properties.filename,
                    autoscale: this.properties.autoscale,
                    colormap: this.properties.colormap
                };
                this.setOutputData(0, outputData);




                // Создаем временный canvas для исходного ImageData
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');

                tempCanvas.width = this.properties.width;
                tempCanvas.height = this.properties.height;
                
                const minVal =  this.properties.minValue;
                const maxVal =  this.properties.maxValue;

                const autoscale = this.properties.autoscale;
                const colormap = this.properties.colormap;
                const colorMap = getColormap(colormap);
                const data = new Uint8ClampedArray(width * height * 4);
                let dataIndex = 0;
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const normalizedValue = autoscale 
                            ? (result.data[y][x] - minVal) / (maxVal - minVal + 1e-9) 
                            : (result.data[y][x] - scale[0]) / (scale[1] - scale[0] + 1e-9);
                        
                        const color = colorMap(Math.max(0, Math.min(1, normalizedValue)));
                        data[dataIndex++] = color.r * 255;
                        data[dataIndex++] = color.g * 255;
                        data[dataIndex++] = color.b * 255;
                        data[dataIndex++] = 255;
                    }
                }
                const imageData = new ImageData(data, width, height);
                // Полное копирование ImageData
                tempCtx.putImageData(imageData, 0, 0); 

                // Создаем canvas для обрезанного фрагмента
                const cropped = document.createElement('canvas');
                const ctx = cropped.getContext('2d');
                cropped.width = width;
                cropped.height = height;

                // Рисуем только нужный фрагмент (safeX, safeY, safeWidth, safeHeight)
                // из временного canvas в final canvas
                ctx.drawImage(
                    // Источник (исходное изображение)
                    tempCanvas,
                    // Координаты и размер фрагмента в источнике 
                    0, 0, width, height, 
                    // Координаты и размер на новом canvas (без масштабирования)
                    0, 0, width, height         
                );
                const out = ctx.getImageData(0, 0, width, height);
                this.properties.previewData = out;
            }
        }

                }

                    0, 0, width, height
                );
                const out = ctx.getImageData(0, 0, width, height);
                this.properties.previewData = out;
            }

            /**
             * Применяет медианный фильтр к матрице m × n.
             * @param {number[][]} matrix - Входная матрица (массив массивов).
             * @param {number} kernelSize - Размер окна фильтра (нечетное число, например 3).
             * @returns {number[][]} - Отфильтрованная матрица.
             */
            _medianFilter(matrix, kernelSize = 3) {
                const m = matrix.length;
                const n = matrix[0].length;
                const padSize = Math.floor(kernelSize / 2);
                const paddedMatrix = this._createPaddedMatrix(matrix, padSize);
                const filteredMatrix = [];

                for (let i = 0; i < m; i++) {
                    const row = [];
                    for (let j = 0; j < n; j++) {
                        // Извлекаем подматрицу (окрестность) размера kernelSize × kernelSize
                        const window = this._extractWindow(paddedMatrix, i + padSize, j + padSize, kernelSize);
                        // Находим медиану
                        const median = this._calculateMedian(window);
                        row.push(median);
                    }
                    filteredMatrix.push(row);
                }

                return filteredMatrix;
            }

            /**
             * Создает расширенную матрицу с нулевыми границами для обработки краев.
             */
            _createPaddedMatrix(matrix, padSize) {
                const m = matrix.length;
                const n = matrix[0].length;
                const padded = new Array(m + 2 * padSize);

                for (let i = 0; i < padded.length; i++) {
                    padded[i] = new Array(n + 2 * padSize).fill(0);
                }

                // Копируем исходную матрицу в центр расширенной
                for (let i = 0; i < m; i++) {
                    for (let j = 0; j < n; j++) {
                        padded[i + padSize][j + padSize] = matrix[i][j];
                    }
                }

                return padded;
            }

            /**
             * Извлекает подматрицу (окрестность) вокруг точки (x, y).
             */
            _extractWindow(matrix, x, y, size) {
                const half = Math.floor(size / 2);
                const window = [];

                for (let i = x - half; i <= x + half; i++) {
                    for (let j = y - half; j <= y + half; j++) {
                        window.push(matrix[i][j]);
                    }
                }

                return window;
            }

            /**
             * Вычисляет медиану массива чисел.
             */
            _calculateMedian(arr) {
                const sorted = [...arr].sort((a, b) => a - b);
                const mid = Math.floor(sorted.length / 2);
                return sorted.length % 2 !== 0 
                    ? sorted[mid] 
                    : (sorted[mid - 1] + sorted[mid]) / 2;
            }
        }

            // Вычисление коэффициентов полинома методом наименьших квадратов
            _computePolynomialCoefficients(matrix, width, height, order, allArea) {
                
                // 1. Подсчет точек и коэффициентов
                // N — общее число точек
                // K — число коэффициентов полинома
                const N = allArea ? width * height : this._countSelectedPixels(matrix, width, height);
                const K = this._calculatePolynomialTerms(order);
                
                if (N <= 2 * K) {
                    console.warn("Insufficient data points for polynomial fit (N <= 2*K)");
                    return { coefficients: null, success: false };
                }

                // 2. Инициализация матрицы сумм (K×K) и вектора b (K элементов)
                const sums = Array(K + 1).fill(0).map(() => Array(K + 1).fill(0));// Матрица A^T A
                const b = Array(K + 1).fill(0);// Вектор A^T y

                // 3. Заполнение матрицы и вектора через метод `_buildSystemMatrix`
                this._buildSystemMatrix(matrix, width, height, order, allArea, sums, b);
                
                // 4. Решение системы линейных уравнений методом Гаусса
                const coefficients = this._solveGaussianElimination(sums, b);
                
                return { coefficients, success: true };// Возвращаем коэффициенты и флаг успеха

            }

            // Подсчет количества точек в выделенной области (заглушка)
            _countSelectedPixels(matrix, width, height) {
                // В реальном приложении здесь должна быть логика работы с выделением
                // Пока считаем все пиксели
                return width * height;
            }

            // Расчет количества членов полинома для заданного порядка
            _calculatePolynomialTerms(order) {
                // Формула для количества членов: (order+1)(order+2)/2 - 1
                return (order + 1) * (order + 2) / 2 - 1;
            }

            // Построение матрицы сумм и вектора b
            _buildSystemMatrix(matrix, width, height, order, allArea, sums, b) {
                const terms = this._getPolynomialTerms(order);
                const N = allArea ? width * height : this._countSelectedPixels(matrix, width, height);
                
                // Обходим все пиксели
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        //const index = y * width + x;
                        const value = matrix[y][x];
                        
                        // Пропуска точек вне выделенной области (если нужно)
                        if (!allArea && !this._isPixelSelected(x, y)) {
                            continue;
                        }
                        
                        // Вычисляем вектор A для текущей точки
                        const A = this._calculatePolynomialTerms1(x, y, order);
                        
                        // Обновляем матрицу сумм
                        for (let i = 0; i < A.length; i++) {
                            for (let j = 0; j < A.length; j++) {
                                sums[i][j] += A[i] * A[j];
                            }
                        }
                        
                        // Обновляем вектор b
                        for (let i = 0; i < A.length; i++) {
                            b[i] += A[i] * value;
                        }
                    }
                }
            }

            // Проверка, находится ли пиксель в выделенной области (заглушка)
            _isPixelSelected(x, y) {
                // В реальном приложении здесь должна быть логика работы с выделением
                return true;
            }


        
            // Генерация списка членов полинома для заданного порядка
            _getPolynomialTerms(order) {
                const terms = [];
                let count = 0;
                
                for (let m = 0; m <= order; m++) {
                    for (let n = 0; n <= m; n++) {
                        terms.push({ m: m, n: n });
                        count++;
                    }
                }
                
                return terms;
            }

            // Вычисление вектора A для конкретной точки (x, y)
            _calculatePolynomialTerms1(x, y, order) {
                const terms = this._getPolynomialTerms(order);
                const A = [1.0]; // Первый член - константа
                
                for (let i = 1; i < terms.length; i++) {
                    const term = terms[i];
                    const xTerm = Math.pow(x, term.m - term.n);
                    const yTerm = Math.pow(y, term.n);
                    A.push(xTerm * yTerm);
                }
                
                return A;
            }

            // Метод Гаусса для решения системы уравнений
            _solveGaussianElimination(sums, b) {
                const K = sums.length - 1;
                const a = Array(K + 1).fill(0);
                
                // Прямой ход (элиминация)
                for (let k = 0; k < K; k++) {
                    // Поиск ведущего элемента (для устойчивости)
                    let maxRow = k;
                    for (let i = k + 1; i < K; i++) {
                        if (Math.abs(sums[i][k]) > Math.abs(sums[maxRow][k])) {
                            maxRow = i;
                        }
                    }
                    
                    // Проверка на сингулярность
                    if (sums[maxRow][k] === 0) {
                        console.error("Singular matrix - cannot solve system");
                        return null;
                    }
                    
                    // Перестановка строк
                    if (maxRow !== k) {
                        for (let j = k; j <= K; j++) {
                            [sums[k][j], sums[maxRow][j]] = [sums[maxRow][j], sums[k][j]];
                        }
                        [b[k], b[maxRow]] = [b[maxRow], b[k]];
                    }
                    
                    // Нормализация строки
                    const factor = sums[k][k];
                    for (let j = k; j <= K; j++) {
                        sums[k][j] /= factor;
                    }
                    b[k] /= factor;
                    
                    // Исключение переменных
                    for (let i = k + 1; i < K; i++) {
                        const factor = sums[i][k];
                        for (let j = k; j <= K; j++) {
                            sums[i][j] -= factor * sums[k][j];
                        }
                        b[i] -= factor * b[k];
                    }
                }
                
                // Обратный ход
                for (let i = K - 1; i >= 0; i--) {
                    a[i] = b[i];
                    for (let j = i + 1; j < K; j++) {
                        a[i] -= sums[i][j] * a[j];
                    }
                    a[i] /= sums[i][i];
                }
                
                return a;
            }

            // Применение полинома к изображенияю
            _applyPolynomialCorrection(matrix, width, height, coefficients, allArea) {
                const order = Math.floor(Math.sqrt(2 * coefficients.length + 1)) - 1;
                const terms = this._getPolynomialTerms(order);

                        //   console.log(order);
                        //   console.log(terms);
                
                //const correctedData = new Float32Array(grayData.length);
                const correctedData = new Array(height);
 


                // Обрабатываем все пиксели
                for (let y = 0; y < height; y++) {

                        //const index = y * width + x;
                        const value = matrix[y][x];
                        
                        // Пропуска точек вне выделенной области (если нужно)
                        if (!allArea && !this._isPixelSelected(x, y)) {
                            correctedData[y][x] = value; // Оставляем исходное значение
                            //correctedData[index] = value; // Оставляем исходное значение
                            continue;
                        }
                        
                        // Вычисляем вектор A для текущей точки
                        const A = this._calculatePolynomialTerms1(x, y, order);
                        
                        // Вычисляем значение полинома
                        let val = 0;
                        for (let i = 0; i < coefficients.length; i++) {
                            val += coefficients[i] * A[i];
                        }
                        //console.log(val);
                        //  console.log(coefficients);

                        // Коррекция: исходное значение - фоновое значение
                        //correctedData[index] = Math.max(0, Math.min(1, value - val));

                        correctedData[y][x] = val;
                        //correctedData[y][x] = Math.max(0, Math.min(1, value - val));
                    }
                }
                
                return correctedData;
            }

            // Конвертация обратно в RGBA
            _convertToRGBA(grayData, width, height) {
                const rgbaData = new Uint8ClampedArray(grayData.length * 4);
                
                for (let i = 0; i < grayData.length; i++) {

        class Resize extends TransformNode {
            constructor() {

                this.addWidget("number", "Ширина", this.properties.node_width,v => {

                    this.properties.node_height = v; 
                    window.updateInspectorIfSelected?.(this);
                }, {
                    min: 1,
                    step: 10,
                    precision: 0
                });
            }
            onExecute() {
                if (this.inputs[0] && this.inputs[0].link) {
                    const inputData = this.getInputData(0);
                    if (inputData) {

                        this.properties.width = inputData.width;
                        this.properties.height = inputData.height;
                        this.properties.data = inputData.data;
                        this.properties.minValue = inputData.minValue;
                        this.properties.maxValue = inputData.maxValue;
                        this.properties.autoscale = inputData.autoscale !== undefined ? inputData.autoscale : this.properties.autoscale;
                        this.properties.colormap = inputData.colormap;
                        this.properties.filename = inputData.filename;
                        this.properties.format = inputData.format;

                        const w = Math.max(1, Math.round(this.properties.node_width));
                        const h = Math.max(1, Math.round(this.properties.node_height));

                        let matrix = this.properties.data;
                        const width = this.properties.width;
                        const height = this.properties.height;
                        const minVal =  this.properties.minValue;
                        const maxVal =  this.properties.maxValue;
                        const autoscale = true;
                        const colormap = 'gray';
                        const colorMap = getColormap(colormap);
                        const data = new Uint8ClampedArray(width * height * 4);
                        let dataIndex = 0;
                        for (let y = 0; y < height; y++) {
                            for (let x = 0; x < width; x++) {
                                const normalizedValue = autoscale 
                                    ? (matrix[y][x] - minVal) / (maxVal - minVal + 1e-9) 
                                    : (matrix[y][x] - scale[0]) / (scale[1] - scale[0] + 1e-9);
                                
                                const color = colorMap(Math.max(0, Math.min(1, normalizedValue)));
                                data[dataIndex++] = color.r * 255;
                                data[dataIndex++] = color.g * 255;
                                data[dataIndex++] = color.b * 255;
                                data[dataIndex++] = 255;
                            }
                        }
                        const imageData = new ImageData(data, width, height);
                        const canvas = document.createElement('canvas');
                        canvas.width = w; 
                        canvas.height = h;
                        const ctx = canvas.getContext('2d');
                        const tmp = document.createElement('canvas');
                        tmp.width = imageData.width;
                        tmp.height = imageData.height;
                        tmp.getContext('2d').putImageData(imageData, 0, 0);
                        ctx.imageSmoothingEnabled = true;
                        ctx.drawImage(tmp, 0, 0, w, h);
                        const out = ctx.getImageData(0, 0, w, h);
                        const restoredMatrix = imageToMatrix(out,w,h, minVal, maxVal, true);


                        // Формируем выходные данные
                        const outputData = {
                            width: w,
                            height: h,
                            data: restoredMatrix,
                            minValue: this.properties.minValue,
                            maxValue: this.properties.maxValue,
                            format: this.properties.format,
                            filename: this.properties.filename,
                            autoscale: this.properties.autoscale,
                            colormap: this.properties.colormap
                        };
                        this.setOutputData(0, outputData);

                        // **Сохраняем изображение в превью** (для визуализации)
                        this.properties.previewData = out;
                    }
                }
            }
            createWidgets() {
                // Очищаем существующие виджеты

                this.addWidget("number", "Высота", this.properties.node_height, v => {

                }, {
                    min: 1,
                    step: 10,
                    precision: 0
                });

            constructor() {
                super();

                }
                 
            
                );
            }
        
            onExecute() {

                if (this.inputs[0] && this.inputs[0].link) {
                    const inputData = this.getInputData(0);
                    if (inputData) {

                        this.properties.width = inputData.width;
                        this.properties.height = inputData.height;
                        this.properties.data = inputData.data;
                        this.properties.minValue = inputData.minValue;
                        this.properties.maxValue = inputData.maxValue;
                        this.properties.autoscale = inputData.autoscale !== undefined ? inputData.autoscale : this.properties.autoscale;
                        this.properties.colormap = inputData.colormap;
                        this.properties.filename = inputData.filename;
                        this.properties.format = inputData.format;

                        // ----- поворот всего изображения -----
                        let matrix = this.properties.data;
                        const width = this.properties.width;
                        const height = this.properties.height;
                        const minVal =  this.properties.minValue;
                        const maxVal =  this.properties.maxValue;
                        const autoscale = true;
                        const colormap = 'gray';
                        const colorMap = getColormap(colormap);
                        const data = new Uint8ClampedArray(width * height * 4);
                        let dataIndex = 0;
                        for (let y = 0; y < height; y++) {
                            for (let x = 0; x < width; x++) {
                                const normalizedValue = autoscale 
                                    ? (matrix[y][x] - minVal) / (maxVal - minVal + 1e-9) 
                                    : (matrix[y][x] - scale[0]) / (scale[1] - scale[0] + 1e-9);
                                
                                const color = colorMap(Math.max(0, Math.min(1, normalizedValue)));
                                data[dataIndex++] = color.r * 255;
                                data[dataIndex++] = color.g * 255;
                                data[dataIndex++] = color.b * 255;
                                data[dataIndex++] = 255;
                            }
                        }

                        // ----- поворот всего изображения -----
                        const imageData = new ImageData(data, width, height);
                        const rad = (this.properties.Angle * Math.PI) / 180;
                        const sin = Math.abs(Math.sin(rad));
                        const cos = Math.abs(Math.cos(rad));
                        const nw = Math.round(width * cos + height * sin);
                        const nh = Math.round(width * sin + height * cos);
                        const c = document.createElement('canvas');
                        c.width = nw;
                        c.height = nh;
                        const ctx = c.getContext('2d');
                        const tmp = document.createElement('canvas');
                        tmp.width = width;
                        tmp.height = height;
                        tmp.getContext('2d').putImageData(imageData, 0, 0);
                        ctx.translate(nw / 2, nh / 2);
                        ctx.rotate(rad);
                        ctx.drawImage(tmp, -width / 2, -height / 2);
                        const out = ctx.getImageData(0, 0, nw, nh);
                        const restoredMatrix = imageToMatrix(out,nw,nh, minVal, maxVal, true);

                        // Формируем выходные данные
                        const outputData = {
                            width: nw,
                            height: nh,
                            data: restoredMatrix,
                            minValue: this.properties.minValue,
                            maxValue: this.properties.maxValue,
                            format: this.properties.format,
                            filename: this.properties.filename,
                            autoscale: this.properties.autoscale,
                            colormap: this.properties.colormap
                        };
                        this.setOutputData(0, outputData);

                        // **Сохраняем изображение в превью** (для визуализации)
                        this.properties.previewData = out;
                    }
                }
            }
        
    
            createWidgets() {

                    max: 360,    // Максимальное значение
                    step: 0.1,   // Шаг изменения
                    precision: 2 // Точность вывода (2 знака после запятой)
                });
            };

            // Метод для восстановления состояния виджетов
            onConfigure(o) {

            };

            onExecute() {

                if (this.inputs[0] && this.inputs[0].link) {

                        this.properties.width = inputData.width;

                        this.properties.colormap = inputData.colormap;
                        this.properties.filename = inputData.filename;
                        this.properties.format = inputData.format;



            

                        // Ограничиваем значения, чтобы они не выходили за границы
                        const safeX = Math.max(0, Math.min(this.properties.node_x, inputData.width - 1));
                        const safeY = Math.max(0, Math.min(this.properties.node_y, inputData.height - 1));
                        const safeWidth = Math.min(this.properties.node_width, inputData.width - safeX);
                        const safeHeight = Math.min(this.properties.node_height, inputData.height - safeY);




                        // Создаем временный canvas для исходного ImageData
                        const tempCanvas = document.createElement('canvas');
                        const tempCtx = tempCanvas.getContext('2d');
                        tempCanvas.width = inputData.width;
                        tempCanvas.height = inputData.height;

                        let matrix = this.properties.data;
                        const width = this.properties.width;
                        const height = this.properties.height;
                        const minVal =  this.properties.minValue;
                        const maxVal =  this.properties.maxValue;
                        const autoscale = true;
                        const colormap = 'gray';
                        const colorMap = getColormap(colormap);
                        const data = new Uint8ClampedArray(width * height * 4);
                        let dataIndex = 0;
                        for (let y = 0; y < height; y++) {
                            for (let x = 0; x < width; x++) {
                                const normalizedValue = autoscale 
                                    ? (matrix[y][x] - minVal) / (maxVal - minVal + 1e-9) 
                                    : (matrix[y][x] - scale[0]) / (scale[1] - scale[0] + 1e-9);
                                
                                const color = colorMap(Math.max(0, Math.min(1, normalizedValue)));
                                data[dataIndex++] = color.r * 255;
                                data[dataIndex++] = color.g * 255;
                                data[dataIndex++] = color.b * 255;
                                data[dataIndex++] = 255;
                            }
                        }
                        const imageData = new ImageData(data, width, height);
                        tempCtx.putImageData(imageData, 0, 0); // Полное копирование ImageData

                        // Создаем canvas для обрезанного фрагмента
                        const cropped = document.createElement('canvas');
                        const ctx = cropped.getContext('2d');
                        cropped.width = safeWidth;
                        cropped.height = safeHeight;

                        // Рисуем только нужный фрагмент (safeX, safeY, safeWidth, safeHeight) из временного canvas в final canvas
                        ctx.drawImage(
                            tempCanvas, // Источник (исходное изображение)
                            safeX, safeY, safeWidth, safeHeight, // Координаты и размер фрагмента в источнике
                            0, 0, safeWidth, safeHeight         // Координаты и размер на новом canvas (без масштабирования)
                        );


                        const out = ctx.getImageData(0, 0, safeWidth, safeHeight);
                        this.properties.previewData = out;
                        const restoredMatrix = imageToMatrix(out,safeWidth,safeHeight, minVal, maxVal, true);




                        // Формируем выходные данные
                        const outputData = {
                            width: safeWidth,
                            height: safeHeight,
                            data: restoredMatrix,
                            minValue: this.properties.minValue,
                            maxValue: this.properties.maxValue,
                            format: this.properties.format,
                            filename: this.properties.filename,
                            autoscale: this.properties.autoscale,
                            colormap: this.properties.colormap
                        };
                        this.setOutputData(0, outputData);

                        

                    }
                }

            }
        }

        class Threshold extends TransformNode {
            constructor() {
                super(); 
                this.title = "Порог";
                this.properties = {
                    node_min: 0,
                    node_less_min: 0,
                    node_max: 1,
                    node_more_max: 1,
                };
                this.addWidget("number", "Минимум", 0, v => this.properties.node_min = v,           { min: -50000, max: 50000, step:0.00001, precision: 6 });
                this.addWidget("number", "< Минимума", 0, v => this.properties.node_less_min = v,   { min: -50000, max: 50000, step:0.00001, precision: 6 });
                this.addWidget("number", "Максимум", 1, v => this.properties.node_max = v,          { min: -50000, max: 50000, step:0.00001, precision: 6 });
                this.addWidget("number", "> Максимума", 1, v => this.properties.node_more_max = v,  { min: -50000, max: 50000, step:0.00001, precision: 6 });
                this.size[0] = 250; // Только ширина = 250, высота — авто
                this.addInput("sel", "array"); 
                // Массив для хранения точек лассо (координаты кликов/движений мыши)
                this.points = [];
            }

            // Алгоритм точки внутри многоугольника (чётность-нечётность)
            _isPointInPolygon(px, py) {
                let inside = false;
                for (let i = 0, j = this.points.length - 1; i < this.points.length; j = i++) {
                    const [xi, yi] = this.points[i];
                    const [xj, yj] = this.points[j];
                    const intersect = (
                        yi > py !== yj > py &&
                        px < (xj - xi) * (py - yi) / (yj - yi) + xi
                    );
                    if (intersect) inside = !inside;
                }
                return inside;
            }

            onExecute() {
               
                    const inputData = this.getInputData(0);
                    const sel = this.getInputData(1);
                    
                    if (!inputData ) return;// Если нет данных - выходим
                
                    this.properties.width = inputData.width;
                    this.properties.height = inputData.height;
                    this.properties.data = inputData.data;
                    this.properties.minValue = inputData.minValue;
                    this.properties.maxValue = inputData.maxValue;
                    this.properties.autoscale = inputData.autoscale;
                    this.properties.colormap = inputData.colormap;
                    this.properties.filename = inputData.filename;

                    const width =   this.properties.width;
                    const height =  this.properties.height;



                    // Создаем матрицу для результата
                    const result = {
                        data: new Array(height)
                    };
                    for (let y = 0; y < height; y++) {
                        result.data[y] = new Array(width);
                    }
                    
                    if  (!sel) {
                        // Выполняем поэлементное деление
                        for (let y = 0; y < height; y++) {
                            for (let x = 0; x < width; x++) {
                                result.data[y][x] = this.properties.data[y][x];

                                if(result.data[y][x] > this.properties.node_max) {
                                    result.data[y][x] = this.properties.node_more_max;
                                }
                                
                                if(result.data[y][x] < this.properties.node_min) {
                                    result.data[y][x] = this.properties.node_less_min;
                                }
                            }
                        }
                    }
                    else{
                        this.points = sel;
                        console.log(this.points);
                        // Выполняем поэлементное деление
                        for (let y = 0; y < height; y++) {
                            for (let x = 0; x < width; x++) {
                                result.data[y][x] = this.properties.data[y][x];

                                let isInside = false;

                                if(isInside){
                                   
                                    if(result.data[y][x] > this.properties.node_max) {
                                        result.data[y][x] = this.properties.node_more_max;
                                    }
                                    
                                    if(result.data[y][x] < this.properties.node_min) {
                                        result.data[y][x] = this.properties.node_less_min;
                                    }

                                //const alpha = isInside ? 255 : 128;

                    }


                    var max_result = result.data[0][0];

                    for (let y = 0; y < height; y++) {
                        for (let x = 0; x < width; x++) {

                    }

                // Создаем временный canvas для исходного ImageData

        calculatePolarToCartesian(data, oldHeight, oldWidth, center_x, center_y, dAngle, angle0, newHeight, newWidth, dr) {
        //let Res = new Array(newWidth * newHeight).fill(0);
        let angle, dx, dy, val, ind_x0, ind_x1, ind_y0, ind_y1;
        let coord_x, coord_y, dc_x, dc_y, a, b;

        const Res = new Array(newHeight);

        for (let i = 0; i < newHeight; i++) {
        Res[i] = new Array(newWidth);
        angle = (2.0 * Math.PI * (angle0 + dAngle * i)) / 360.0;
        dx = dr * Math.sin(angle);
        dy = dr * Math.cos(angle);

        for (let j = 0; j < newWidth; j++) {

        coord_y = center_y + dy * j;
        coord_x = center_x + dx * j;

        // Граничные условия
        if (coord_x >= oldWidth - 1) coord_x = oldWidth - 2;
        if (coord_y >= oldHeight - 1) coord_y = oldHeight - 2;
        if (coord_x < 0) coord_x = 0.0;
        if (coord_y < 0) coord_y = 0.0;

        ind_y0 = Math.floor(coord_y);
        ind_x0 = Math.floor(coord_x);
        ind_x1 = ind_x0 + 1;
        ind_y1 = ind_y0 + 1;

        dc_x = coord_x - ind_x0;
        dc_y = coord_y - ind_y0;

        val = 0.0;
        if (ind_y0 >= 0 && ind_y0 < oldHeight && ind_x0 >= 0 && ind_x0 < oldWidth &&
        ind_y1 >= 0 && ind_y1 < oldHeight && ind_x1 >= 0 && ind_x1 < oldWidth) {

        a = data[ind_y0][ind_x0] + dc_x * (data[ind_y0][ind_x1] - data[ind_y0][ind_x0]);
        b = data[ind_y1][ind_x0] + dc_x * (data[ind_y1][ind_x1] - data[ind_y1][ind_x0]);         
        val = a + dc_y * (b - a);
        }

        Res[i][j] = val;
        }
        }
        return Res;
        }

        calculateCartesianToPolar(data, oldHeight, oldWidth, center_x, center_y, dAngle, angle0, newHeight, newWidth, dr) {


        let minAngle = Infinity;
        let r_x, r_y, R, ang_x, angle;

        // Первый проход - определение minAngle
        for (let i = 0; i < newHeight; i++) {
        r_y = (-center_y + i) / dr;
        for (let j = 0; j < newWidth; j++) {
        r_x = (-center_x + j) / dr;
        R = Math.sqrt(r_y * r_y + r_x * r_x);
        if (R < 0.001) R = 0.001;

        ang_x = Math.asin(r_y / R);
        angle = angle0 + ang_x;
        if (angle < minAngle) minAngle = angle;
        }
        }

        // Корректировка angle0
        angle0 = Math.PI + (dAngle / 2.0) * (2.0 * Math.PI / 360.0);

        // Второй проход - само преобразование
        //let Res = new Array(newWidth * newHeight).fill(0);
        const Res = new Array(newHeight);
        for (let i = 0; i < newHeight; i++) {
        Res[i] = new Array(newWidth);
        r_y = (-center_y + i) / dr;
        for (let j = 0; j < newWidth; j++) {
        r_x = (-center_x + j) / dr;
        R = Math.sqrt(r_y * r_y + r_x * r_x);
        if (R < 0.001) R = 0.001;

        ang_x = Math.asin(r_y / R);
        angle = 360.0 * ((angle0 + ang_x - minAngle) / (dAngle * 2.0 * Math.PI));

        // Коррекция для правой полуплоскости
        if (r_x > 0.0) {
        angle = (oldHeight + 1.0) - angle;
        }

        // Граничные условия
        let angleInt = Math.floor(angle);
        if (angleInt < 0 || angleInt >= oldHeight || Math.floor(R) >= oldWidth) {
        Res[i][j] = 0.0;
        } else {
        Res[i][j] = data[angleInt][Math.floor(R)];
        }
        }
        }
        return Res;
        }

        class Difference extends CalculationNode {
            constructor() {
                super(); 
                this.title = "Деление";
            }

            onExecute() {

                const epsilon = 0.0001;

                // Получаем входные данные
                const matrixA = this.getInputData(0);
                const matrixB = this.getInputData(1);
                //const epsilon = this.getInputData(2) ?? this.properties.epsilon;


                // const inputData = this.getInputData(0);
                // this.properties.width = inputData.width;
                // this.properties.height = inputData.height;
                // this.properties.data = inputData.data;
                // this.properties.minValue = inputData.minValue;
                // this.properties.maxValue = inputData.maxValue;
                // this.properties.autoscale = inputData.autoscale !== undefined ? inputData.autoscale : this.properties.autoscale;
                // this.properties.colormap = inputData.colormap;
                // this.properties.filename = inputData.filename;
                // this.properties.format = inputData.format;


                // Если нет данных - возвращаем null
                if (!matrixA || !matrixB) {
                    this.outputs[0].links = null;
                    return;
                }
                
                // Проверяем структуру матриц
                if (!this._isValidMatrix(matrixA) || !this._isValidMatrix(matrixB)) {
                    console.error("Invalid matrix structure");
                    this.outputs[0].links = null;
                    return;
                }
        





                // Определяем размеры результата (минимум из размеров входов)
                const width = Math.min(matrixA.width, matrixB.width);
                const height = Math.min(matrixA.height, matrixB.height);

                // Создаем матрицу для результата
                const result = {
                    data: new Array(height)
                };
                
                // Выполняем поэлементное деление
                for (let y = 0; y < height; y++) {
                    result.data[y] = new Array(width);
                    for (let x = 0; x < width; x++) {
                        const a = matrixA.data[y][x] ?? 0;
                        const b = matrixB.data[y][x] ?? 0;
                        
                        // Защита от деления на ноль
                        const denominator = Math.abs(b) < epsilon ? epsilon : b;
                        
                        // Вычисляем результат
                        let value;
                        if (this.properties.outputType === "int") {
                            value = Math.floor(a / denominator);
                        } else {
                            value = a / denominator;
                        }
                        
                        result.data[y][x] = value;
                    }
                }


                var max_result = result.data[0][0];
                var min_result = result.data[0][0];
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {

                        if(result.data[y][x] > max_result) {
                            max_result = result.data[y][x];
                        }
                        if(result.data[y][x] < min_result) {
                            min_result = result.data[y][x];
                        }
                    }
                }
                
                


                // Формируем выходные данные
                const outputData = {
                    width: width,
                    height: height,
                    data: result.data,
                    minValue: min_result,
                    maxValue: max_result,
                    format: matrixA.format,
                    filename: matrixA.filename,
                    autoscale: matrixA.autoscale,
                    colormap: matrixA.colormap
                };
                this.setOutputData(0, outputData);



                // Создаем временный canvas для исходного ImageData
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');

                tempCanvas.width = width;
                tempCanvas.height = height;
                
                const minVal =  min_result;
                const maxVal =  max_result;

                const autoscale = true;
                const colormap = 'gray';
                const colorMap = getColormap(colormap);
                const data = new Uint8ClampedArray(width * height * 4);
                let dataIndex = 0;
                for (let y = 0; y < height; y++) {
                    for (let x = 0; x < width; x++) {
                        const normalizedValue = autoscale 
                            ? (result.data[y][x] - minVal) / (maxVal - minVal + 1e-9) 
                            : (result.data[y][x] - scale[0]) / (scale[1] - scale[0] + 1e-9);
                        
                        const color = colorMap(Math.max(0, Math.min(1, normalizedValue)));
                        data[dataIndex++] = color.r * 255;
                        data[dataIndex++] = color.g * 255;
                        data[dataIndex++] = color.b * 255;
                        data[dataIndex++] = 255;
                    }
                }
                const imageData = new ImageData(data, width, height);
                tempCtx.putImageData(imageData, 0, 0); // Полное копирование ImageData

                // Создаем canvas для обрезанного фрагмента
                const cropped = document.createElement('canvas');
                const ctx = cropped.getContext('2d');
                cropped.width = width;
                cropped.height = height;

                // Рисуем только нужный фрагмент (safeX, safeY, safeWidth, safeHeight) из временного canvas в final canvas
                ctx.drawImage(
                    tempCanvas, // Источник (исходное изображение)
                    0, 0, width, height, // Координаты и размер фрагмента в источнике
                    0, 0, width, height         // Координаты и размер на новом canvas (без масштабирования)
                );


                        const out = ctx.getImageData(0, 0, width, height);
                        this.properties.previewData = out;


                // Устанавливаем выходные данные
                //this.setOutputData(0, result);
            }

            _isValidMatrix(matrix) {
                return matrix && 
                    typeof matrix.width === 'number' && 
                    typeof matrix.height === 'number' &&
                    Array.isArray(matrix.data) &&
                    matrix.data.length === matrix.height;

        // Узел для выделения области интереса (ROI) методом "лассо" (Freehand Selection)

                this.points = [];

                this.path = new Path2D();

                // Смещение при перетаскивании (сохраняет предыдущее положение для вычисления delta)
                this.offsetX = 0;
                this.offsetY = 0;

                this.isDragging = false;
                // Флаг активного рисования (true, когда пользователь рисует лассо)
                this.isDrawing = false;
                // Флаг выделения (true, когда лассо выбрано для перемещения)
