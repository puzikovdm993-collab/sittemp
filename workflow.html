            // Обработчик нажатия мыши (mousedown)
            onMouseDown(event, pos) {
                // Если не в режиме рисования - начинаем новый ROI
                if (!this.isDrawing) {
                    this.isDrawing = true;
                    // Сохраняем первую точку как начальную
                    //this.points = [pos];
                    if(pos[0] >= this.beginx && pos[0] < this.properties.width + this.beginx && 
                       pos[1] >= this.beginy && pos[1] < this.properties.height + this.beginy)
                    {
                        this.points = [pos];
                    }
                    if (pos[0] < this.beginx || pos[0] >= this.properties.width + this.beginx ||
                        pos[1] < this.beginy || pos[1] >= this.properties.height + this.beginy) {
                        // Ограничиваем координаты границами [100, 300] по обеим осям
                        pos[0] = Math.max(this.beginx, Math.min(this.properties.width + this.beginx, pos[0]));
                        pos[1] = Math.max(this.beginy, Math.min(this.properties.height + this.beginy , pos[1]));
                        
                        this.points = [pos];
                    }

                }
                // Если уже рисуем - проверяем попадание в текущую область
                else 
                {
                    // Проверяем, находится ли точка (x,y) 
                    // внутри полигона (используется ctx.isPointInPath)
                    // Используем spread-оператор для извлечения x/y из pos
                    if (this.path.isPointInPath(x, y)) {
                        // Если да - начинаем drag-режим
                        this.isDragging = true;
                        // Сохраняем текущие координаты как точку отсчёта
                        this.offsetX = pos[0];
                        this.offsetY = pos[1];
                        this.selected = true;
                    }
                }
                // Возвращаем true для указания, что событие обработано
                return true;
            }

            // Обработчик движения мыши (mousemove)
            onMouseMove(event,pos) {
                // Если рисуем и не перетаскиваем - добавляем новую точку
                if (this.isDrawing && !this.isDragging)
                {
                    if(pos[0] >= this.beginx && pos[0] < this.properties.width + this.beginx && 
                       pos[1] >= this.beginy && pos[1] < this.properties.height + this.beginy)
                    {
                        this.points.push(pos);
                        // Обновляем путь лассо
                        this.updatePath(); 
                        // Помечаем граф как "грязный" для фоновой перерисовки
                        this.graph?.setDirtyCanvas("bg"); 


                    }
                    if (pos[0] < this.beginx || pos[0] >= this.properties.width + this.beginx ||
                        pos[1] < this.beginy || pos[1] >= this.properties.height + this.beginy) {
                        // Ограничиваем координаты границами [100, 300] по обеим осям
                        pos[0] = Math.max(this.beginx, Math.min(this.properties.width + this.beginx, pos[0]));
                        pos[1] = Math.max(this.beginy, Math.min(this.properties.height + this.beginy , pos[1]));
                        
                        // Добавляем точку и обновляем граф только если координаты были изменены
                        this.points.push([...pos]); // Используем spread-оператор для копирования массива
                        this.updatePath();
                        this.graph?.setDirtyCanvas("bg");
                    }
                    

                } 
                // Если перетаскиваем - перемещаем все точки ROI
                else if (this.isDragging) {
                    // Изменение по X
                    const dx = pos[0] - this.offsetX;
                    // Изменение по Y
                    const dy = pos[1] - this.offsetY;

                    // Перемещаем все точки полигона на delta (dx, dy)
                    for (let p of this.points) {
                        p[0] += dx; // Обновляем координаты X точек
                        p[1] += dy; // Обновляем координаты Y точек
                    }
                    // Обновляем смещение для следующей итерации
                    this.offsetX = pos[0];
                    this.offsetY = pos[1];
                }
            }

            // Обработчик отпускания мыши (mouseup)
            onMouseUp() {
                // Завершаем режим рисования и перетаскивания
                this.isDrawing = false;
                this.isDragging = false;
                // Финальное обновление пути (закрываем контур)
                this.updatePath();


                console.log(this.points.length );
                // Если есть область (минимум 3 точки для замкнутого контура)
                if (this.points.length >= 3) {
                    this.calculatePointsInsidePolygon();
                } else {
                    this.points = [];
                    this.allPoints = []; // Очищаем, если контур не замкнут
                }
                //console.log(this.allPoints );
            }


            // Алгоритм точки внутри многоугольника (чётность-нечётность)
            isPointInPolygon(px, py) {
                let inside = false;
                for (let i = 0, j = this.points.length - 1; i < this.points.length; j = i++) {
                    const [xi, yi] = this.points[i];
                    const [xj, yj] = this.points[j];
                    const intersect = (
                        yi > py !== yj > py &&
                        px < (xj - xi) * (py - yi) / (yj - yi) + xi
                    );
                    if (intersect) inside = !inside;
                }
                return inside;
            }

            // Расчёт всех точек внутри полигона
            calculatePointsInsidePolygon() {
                // Очищаем массив внутренних точек
                this.allPoints = [...this.points]; // Сначала добавляем контур
                
                // Получаем границы ROI
                let minX = Math.min(...this.points.map(p => p[0]));
                let maxX = Math.max(...this.points.map(p => p[0]));
                let minY = Math.min(...this.points.map(p => p[1]));
                let maxY = Math.max(...this.points.map(p => p[1]));

                // Добавляем смещение (100, 100) из onDrawBackground
                const offsetX = 100;
                const offsetY = 100;
                
                // Проверяем каждый пиксель в ограничительном прямоугольнике
                for (let y = Math.floor(minY) - 1; y <= Math.ceil(maxY) + 1; y++) {
                    for (let x = Math.floor(minX) - 1; x <= Math.ceil(maxX) + 1; x++) {
                        // Преобразуем координаты canvas в координаты изображения
                        const imgX = x - offsetX;
                        const imgY = y - offsetY;
                        
                        // Проверяем, что координаты в пределах изображения
                        if (imgX >= 0 && imgY >= 0 && imgX < this.properties.width && imgY < this.properties.height) {
                            // Проверяем, находится ли точка внутри полигона
                            if (this.isPointInPolygon(x, y)) {
                                this.allPoints.push([imgX, imgY]); // Сохраняем координаты относительно изображения
                            }
                        }
                    }
                }
                
                // Уникализация точек (удаление дубликатов)
                this.allPoints = [...new Set(this.allPoints.map(JSON.stringify))].map(JSON.parse);
            }

            // Метод обновления пути лассо (Path2D)
            updatePath() {
                // Создаём новый путь (очищаем предыдущий)
                this.path = new Path2D();
                // Минимум 2 точки для построения контура
                if (this.points.length < 2) return;

                // Начинаем путь из первой точки
                this.path.moveTo(...this.points[0]);

                // Добавляем линии между всеми точками
                for (let i = 1; i < this.points.length; i++)
                {
                    this.path.lineTo(...this.points[i]);
                }

                // Закрываем путь (соединяем последнюю точку с первой)
                this.path.closePath();
                //this.addPointsInsidePath(); // Добавляем точки внутри (плотность 20)
            }


            // Метод рисования фона узла (вызвается при отрисовке графа)
            onDrawBackground(ctx) {
                // Если изображение не загружено - выходим
                if (!this.img) return;

                // Создаем временный canvas для работы с изображением
                const tmp = document.createElement('canvas');
                // Устанавливаем размер из свойств
                tmp.width = this.properties.width;
                tmp.height = this.properties.height;
                // Копируем ImageData на временный canvas
                tmp.getContext('2d').putImageData(this.img, 0, 0);
                // Рисуем изображение в заданных координатах (100,100) и размере (250,250)
                ctx.drawImage(tmp, this.beginx, this.beginy, this.properties.width, this.properties.height);
                this.size[0] = this.properties.width + (this.beginx * 2); // (this.beginx * 2) - отступы с права и с лево
                this.size[1] = this.properties.height + this.beginy + this.beginx;
                
                // Настраиваем стиль обводки контура лассо
                // Красный при выделении, жёлтый - иначе
                ctx.strokeStyle = this.selected ? 'red' : "#4a9eff";
                // Толщина линии
                ctx.lineWidth = 1;
                // Рисуем путь лассо на основном контексте
                ctx.stroke(this.path);

                ctx.fillStyle = "rgba(133, 189, 253, 0.15)"; // Пример: полупрозрачный красный
                ctx.fill(this.path);

                // Настраиваем стиль прямоугольника (красный при выделении, белый иначе)
                ctx.strokeStyle = this.selected ? 'red' : 'white';
                ctx.lineWidth = 1; // Толщина линии

                // // Рисуем рамку прямоугольника ROI
                // ctx.strokeRect(
                //     100, // X-координата начала
                //     100, // Y-координата начала
                //     200, // Ширина прямоугольника
                //     200  // Высота прямоугольника
                // );
            }

            // Основной метод обработки данных (вызывается при execution узла)
            onExecute() {

                // Получаем входные данные (ожидаем объект с данными изображения)
                const inputData = this.getInputData(0); 
                if (!inputData ) {
                    return;// Если нет данных - выходим
                }

                // Сохраняем метаданные в свойства узла
                this.properties.width = inputData.width;
                this.properties.height = inputData.height;
                // Матрица значений пикселей
                this.properties.data = inputData.data;
                // Минимальное значение в данных
                this.properties.minValue = inputData.minValue;
                // Максимальное значение
                this.properties.maxValue = inputData.maxValue;
                // Сохраняем autoscale
                this.properties.autoscale = inputData.autoscale;
                // Сохраняем цветовую карту
                this.properties.colormap = inputData.colormap;
                // Сохраняем имя файла и формат (для сохранения)
                this.properties.filename = inputData.filename;
                this.properties.format = inputData.format;
                        

                //Формируем выходные данные
                const outputData = {
                    width: this.properties.width,
                    height: this.properties.height,
                    data: this.properties.data,
                    minValue: this.properties.minValue,
                    maxValue: this.properties.maxValue,
                    format: this.properties.format,
                    filename: this.properties.filename,
                    autoscale: this.properties.autoscale,
                    colormap: this.properties.colormap
                };
                this.setOutputData(0, outputData);
                //console.log(this.points.length);
                if  (this.points.length > 2){

                    this.setOutputData(1, this.points);
                }

                // Создаем временный canvas для отрисовки исходного изображения
                const tempCanvas = document.createElement('canvas');
                const tempCtx = tempCanvas.getContext('2d');

                // Настраиваем размер временного canvas под изображение
                tempCanvas.width = this.properties.width;
                tempCanvas.height = this.properties.height;

                // Получаем цветовую карту по имени
                const colorMap = getColormap(this.properties.colormap);

                // Создаем буфер для пикселей RGBA
                const data = new Uint8ClampedArray(this.properties.width * this.properties.height * 4);
                let dataIndex = 0;


                // Преобразуем значения пикселей в цвета
                for (let y = 0; y < this.properties.height; y++) {
                    for (let x = 0; x < this.properties.width; x++) {

                        const normalizedValue = (this.properties.data[y][x] - this.properties.minValue) 
                                        / (this.properties.maxValue - this.properties.minValue + 1e-9);
                        // Получаем цвет из цветовой карты (ограничиваем в 0-1)
                        const color = colorMap(Math.max(0, Math.min(1, normalizedValue)));
                        
                        // Записываем RGBA значения в буфер
                        data[dataIndex++] = color.r * 255; // R
                        data[dataIndex++] = color.g * 255; // G
                        data[dataIndex++] = color.b * 255; // B
                        data[dataIndex++] = 255;           // A (полная непрозрачность)
                    }
                }
                // Создаем объект ImageData из обработанных данных
                const imageData = new ImageData(data, this.properties.width, this.properties.height);
                // Копируем на временный canvas
                tempCtx.putImageData(imageData, 0, 0);
                const out = tempCtx.getImageData(0, 0, this.properties.width, this.properties.height);
                this.properties.previewData = out;
                this.img = out;
            }
        }

        document.getElementById('run').onclick = async () => {

            // const inspector = document.getElementById('inspector');
            // if (!inspector) return;
            //inspector.classList.remove('visible');
            try {
                const loadNodes = graph.findNodesByType("input/LoadNode");
                for (let node of loadNodes) {
                    if (!node.properties.imageData) {
                        // Создаём промис для асинхронной загрузки файла
                        await new Promise((resolve, reject) => {

                            // Создаём элемент <input type="file"> и настраиваем его:
                            // Создаём HTML-инпут
                            const input = document.createElement('input');
                            // Указываем тип как "файл"
                            input.type = 'file';
                            // Разрешаем только файлы с расширением .tpt
                            input.accept = '.tpt';
                            // Обрабатываем выбор файла пользователем
                            input.onchange = async (e) => {
                                // Получаем первый выбранный файл
                                const file = e.target.files[0];
                                // Если файл не выбран
                                if (!file) {
                                    // Отклоняем промис с ошибкой
                                    reject('Файл не выбран');
                                    // Прерываем выполнение
                                    return;
                                }




                                //Проверяем расширение файла:
                                // Получаем расширение (например, "tpt")
                                const filenameParts123 = file.name.split('.'); // Разделяем по точке (например, "data.tpt" → ["data", "tpt"])
                                const filename123 = filenameParts123.slice(0, -1).join('.'); // Базовое имя без расширения (["data"] → "data")
                                const fileExtension123 = filenameParts123.pop().toLowerCase() || 'unknown'; // Получаем расширение в нижнем регистре (["tpt"] → "tpt")
                                if (fileExtension123 !== 'tpt') {
                                    // Ошибка
                                    reject('Файл должен иметь расширение .tpt');
                                    return;
                                }

                                 // Создаём FileReader для чтения содержимого файла:
                                const reader = new FileReader();

                                // Обработчик ошибок чтения файла (например, CORS или повреждение):
                                reader.onerror = (err) => {
                                    // Логируем тип ошибки (например, "NOT_READABLE_ERROR")
                                    console.error('Ошибка чтения файла:', err.target.error);
                                    // Передаём сообщение об ошибке
                                    reject('Ошибка чтения файла: ' + err.target.error.message);
                                };
        
                                // Обработчик успешного чтения файла (содержимое доступно в ev.target.result):
                                reader.onload = (ev) => {

                                    // Обрабатываем строки файла:
                                    const lines = ev.target.result.split('\n')  // Разбиваем текст по строкам
                                        .map(line => line.trim())               // Удаляем лишние пробелы в начале/конце
                                        .filter(line => line !== '');           // Оставляем только непустые строки

                                    // Проверяем минимальное количество строк (должно быть ≥ 3: width, height, matrix):
                                    if (lines.length < 3) {
                                        reject('Файл .tpt должен содержать минимум 3 строки: width, height, matrix');
                                        return;
                                    }

                                    //Парсим ширину и высоту матрицы:
                                    // Первая строка — ширина
                                    const width = parseInt(lines[0], 10);
                                    // Вторая строка — высота
                                    const height = parseInt(lines[1], 10);

                                    // Проверяем, что width и height — корректные числа:
                                    // Если не числа
                                    const matrix = lines.slice(2).map(line => line.split(/\s+/).map(Number));
                                    if (isNaN(width) || isNaN(height)) {
                                        reject('Ширина и высота должны быть числами');// Ошибка
                                        return;
                                    }

                                    // Проверяем соответствие количества строк матрицы заявленному height:
                                    if (matrix.length !== height) {
                                        reject(`Ожидалось ${height} строк матрицы, найдено ${matrix.length}`);
                                        return;
                                    }

                                    // Проверяем, что все строки матрицы имеют одинаковую ширину (width):
                                    if (matrix.some(row => row.length !== width)) {
                                        reject(`Все строки матрицы должны содержать ${width} чисел`);
                                        return;
                                    }

                                    // Ограничение на размер матрицы (максимум 5000x5000 элементов):
                                    if (width * height > 25_000_000) {
                                        reject('Матрица слишком большая (максимум 25 000 000 элементов)');
                                        return;
                                    }

                                    // Находим минимальное и максимальное значения в матрице:
                                    let minVal = Infinity, maxVal = -Infinity;  // Инициализация
                                    for (let y = 0; y < height; y++) {          // Проходим по строкам
                                        for (let x = 0; x < width; x++) {       // Проходим по столбцам
                                            const val = matrix[y][x];           // Текущее значение
                                            if (val < minVal) minVal = val;     // Обновляем минимум
                                            if (val > maxVal) maxVal = val;     // Обновляем максимум
                                        }
                                    }

                                    // Сохраняем параметры в свойствах узла (node.properties):
                                    node.properties.width = width;              // Ширина матрицы
                                    node.properties.height = height;            // Высота матрицы
                                    node.properties.data = matrix;              // Сама матрица (массив массивов)
                                    node.properties.minValue = minVal;          // Минимальное значение
                                    node.properties.maxValue = maxVal;          // Максимальное значение
                                    node.properties.filename = filename123;     // Имя файла без расширения
                                    node.properties.format =  fileExtension123; // Формат файла (tpt)

                                    // Отмечаем граф как "грязный" (требующий перерисовки):
                                    graph.setDirtyCanvas(true);

                                    // Завершаем промис (успешное выполнение):
                                    resolve();
                                };

                                // Альтернативный обработчик ошибок:
                                reader.onerror = () => reject('Ошибка чтения файла');
                                // Начинаем чтение файла как текста:
                                reader.readAsText(file);
                            };
                            // Принудительно открываем диалог выбора файла:
                            input.click();
                        });
                    }
                }
                const nodesInOrder = graph.computeExecutionOrder(false);
                // Убедитесь, что эта функция не рекурсивна
                await animateExecution(nodesInOrder); 
            } catch (err) {
                alert(`Ошибка: ${err}`);
            } finally {
                btn.classList.remove('running');
                btn.disabled = false;
            }
        };

        function imageToMatrix(imageData, width, height, minVal, maxVal, autoscale = true) {
            // const ctx = canvas.getContext('2d');
            // const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            // const width = canvas.width;
            // const height = canvas.height;
            const data = imageData.data; // Uint8ClampedArray (RGBA)
            const matrix = new Array(height);

            for (let y = 0; y < height; y++) {
                matrix[y] = new Array(width);
                for (let x = 0; x < width; x++) {
                    // Индекс пикселя в ImageData: 4 * (y * width + x)
                    const dataIndex = 4 * (y * width + x);
                    const r = data[dataIndex] / 255;     // Нормализованное значение (0..1)
                    const g = data[dataIndex + 1] / 255;
                    const b = data[dataIndex + 2] / 255;

                    // Для градаций серого используем среднее (или любой канал, например r)
                    const normalizedValue = (r + g + b) / 3; // или просто r (если изображение чёрно-белое)

                    // Обратное преобразование в исходные значения
                    const matrixValue = autoscale 
                        ? minVal + normalizedValue * (maxVal - minVal) 
                        : scale[0] + normalizedValue * (scale[1] - scale[0]);

                    matrix[y][x] = matrixValue;
                }
            }

            return matrix;
        }

        function matrixToImage(matrix, width, height, minVal, maxVal, autoscale = true) {
            // Проверяем корректность размеров
            if (matrix.length !== height || matrix.some(row => row.length !== width)) {
                throw new Error("Размеры матрицы не соответствуют заданным width/height");
            }

            // Создаем массив для данных изображения (RGBA)
            const data = new Uint8ClampedArray(width * height * 4);
            //const maxVal = 255; // Максимальное значение для канала (0..255)

            const colormap = 'gray';
            const colorMap = getColormap(colormap);

            let dataIndex = 0;
            for (let y = 0; y < height; y++) {
                for (let x = 0; x < width; x++) {
                    const matrixValue = matrix[y][x];

                    
                    const normalizedValue = autoscale 
                        ? (matrix[y][x] - minVal) / (maxVal - minVal + 1e-9) 
                        : (matrix[y][x] - scale[0]) / (scale[1] - scale[0] + 1e-9);
                    
                    const color = colorMap(Math.max(0, Math.min(1, normalizedValue)));
                    data[dataIndex++] = color.r * 255;
                    data[dataIndex++] = color.g * 255;
                    data[dataIndex++] = color.b * 255;
                    data[dataIndex++] = 255;
                }
            }
            return new ImageData(data, width, height);
        }
        
        function getColormap(name) {
            const colormaps = {
                'hot': (t) => ({
                    r: t < 0.5 ? 0 : 2 * t,
                    g: t < 0.25 ? 0 : t < 0.75 ? 2 * t - 0.5 : 1,
                    b: t < 0.75 ? 0 : 2 * t - 1
                }),
                'jet': (t) => {
                    const h = 240 * (1 - t); // От синего (t=0) до красного (t=1)
                    const hslToRgb = (h) => {
                        const hue = h / 360; // Нормализуем до [0, 1]
                        const i = Math.floor(hue * 6); // Индекс сегмента
                        const f = hue * 6 - i; // Дополнительная доля
                        
                        // Значения для RGB (избегаем дублирования имён)
                        const red = [1, f, 1 - f, 0, 0, 0][i % 6];
                        const green = [1 - f, 1, 1, 1 - f, 1 - f, 1 - f][i % 6];
                        const blue = [0, 0, 0, 0, 1 - f, 1][i % 6];
                        
                        return { r: red, g: green, b: blue }; // Теперь ключи объекта не конфликтуют
                    };
                    return hslToRgb(h);
                },
                'gray': (t) => ({ r: t, g: t, b: t }),
                'viridis': (t) => { // Упрощённая версия
                    const x = 1 - t;
                    const a = 16.0, b = 254.0;
                    const red = ((6.0 - 2.4 * x) * x * x * x + (-4.8 * x * x * x + 18.0 * x * x - 22.2 * x + 8.3) * x * x * x + (b - a) * x * x * x * x * x * x + a) / 255;
                    const green = ((13.0 - 1.5 * x) * x * x * x + (-12.0 * x * x * x + 45.0 * x * x - 49.5 * x + 17.0) * x * x * x + (b - a) * x * x * x * x * x * x + a) / 255;
                    const blue = ((b - a) * x * x * x * x * x * x + a) / 255;
                    return { r: red, g: green, b: blue }; // Ключи объекта не конфликтуют
                }
            };

            if (!colormaps[name]) {
                console.warn(`Цветовая карта "${name}" не найдена. Используется "gray".`);
                return colormaps['gray'];
            }
            return colormaps[name];
        }

        // Функция для подсветки узла и его входных связей
        function highlightNode(node, highlight = true) {
            if (highlight) {
                node.color = '#00FF00'; // Зеленый для подсветки узла
                if (node.inputs) {
                    node.inputs.forEach(input => {
                        if (input.link !== null) {
                            const link = graph.links[input.link];
                            if (link) {
                                link.color = '#00FF00'; // Зеленый для подсветки связи
                            }
                        }
                    });
                }
            } else {
                node.color = null; // Сброс цвета узла
                if (node.inputs) {
                    node.inputs.forEach(input => {
                        if (input.link !== null) {
                            const link = graph.links[input.link];
                            if (link) {
                                link.color = undefined; // Сброс цвета связи
                            }
                        }
                    });
                }
            }
            graphCanvas.setDirty(true);
        }

        // Асинхронная функция, которая анимирует выполнение узлов графа поочерёдно
        async function animateExecution(nodesInOrder) {
            // Итерируемся по каждому узлу в заданном порядке (nodesInOrder)
            for (const node of nodesInOrder) {
                // Проверяем, нужно ли выполнять узел:
                // - LiteGraph.ALWAYS: узел всегда активен (например, генерирует данные)
                // - LiteGraph.ON_TRIGGER: узел запускается при получении триггера
                if (node.mode === LiteGraph.ALWAYS || node.mode === LiteGraph.ON_TRIGGER) {
                    // Подсвечиваем узел (например, меняем цвет фона или добавляем эффект)
                    // Аргумент `true` означает "активировать подсветку"
                    highlightNode(node, true);

                    // Ручное выполнение узла (аналог автоматического запуска в LiteGraph)
                    // Этот метод вызывает `onExecute` узла, передавая ему входные данные
                    node.doExecute(); 

                    // Задержка на 500 мс, чтобы пользователь успел увидеть анимацию
                    // `await` блокирует выполнение цикла до окончания задержки
                    await new Promise(resolve => setTimeout(resolve, 500)); 

                    // Убираем подсветку узла после выполнения
                    // Аргумент `false` означает "деактивировать подсветку"
                    highlightNode(node, false);
                }
            }
        }

        // сохранения
        function saveToTptFile(node, filename = null) {
            return new Promise((resolve, reject) => {
                try {
                    // Получаем данные из node.properties
                    const { width, height, data, minValue, maxValue, filename: originalFilename } = node.properties;
                    
                    // Если filename не указан, используем оригинальный или генерируем новый
                    const outputFilename = filename || originalFilename || `matrix_${Date.now()}.tpt`;
                    
                    // Формируем строки файла
                    const header = `${height}\n${width}\n`;
                    const matrixLines = data.map(row => 
                        row.map(val => val.toString()).join('\t') // Числа разделены табуляцией (можно заменить на пробел)
                    ).join('\n');
                    
                    // Объединяем заголовок и матрицу
                    const fileContent = header + matrixLines;
                    
                    // Создаём Blob (UTF-8 текст)
                    const blob = new Blob([fileContent], { type: 'text/plain;charset=utf-8' });
                    
                    // Сохраняем файл (используем FileSaver.js или нативный способ)
                    if (typeof saveAs === 'function') {
                        // Если доступна библиотека FileSaver.js
                        saveAs(blob, outputFilename);
                    } else {
                        // Альтернативный способ (без FileSaver.js)
                        const url = URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.href = url;
                        a.download = outputFilename;
                        document.body.appendChild(a);
                        a.click();
                        document.body.removeChild(a);
                        URL.revokeObjectURL(url);
                    }
                    
                    //resolve(`Файл "${outputFilename}" успешно сохранён!`);
                } catch (error) {
                    reject(`Ошибка сохранения файла: ${error.message}`);
                }
            });
        }
        
        

        // Функция сворачивания сайдбара
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const icon = document.getElementById('collapseIcon');
            const toolbar = document.getElementById('toolbar');
            const mainContent = document.getElementById('mainContent');

            // Переключает класс
            const isCollapsed = sidebar.classList.toggle('collapsed');
            // Синхронизирует toolbar
            toolbar.classList.toggle('collapsed', isCollapsed);
            // Обновляет mainContent
            mainContent.classList.toggle('collapsed', isCollapsed);
            // Меняет иконку
            icon.textContent = isCollapsed ? '→' : '←';

            setTimeout(() => {
                resizeGraphCanvas();// Переразмеряет граф
                updateLayout();// Обновляет позицию toolbar
            }, 350);// Задержка для анимации
        }

        // Функция переключения аккордеона группы узлов
        function toggleGroup(header) {
            // Находит родительский .node-group
            const group = header.parentElement;
            // Переключает состояние
            group.classList.toggle('collapsed');
        }

        // Функция обновления позиции toolbar
        function updateLayout() {
            const toolbar = document.getElementById('toolbar');
            const collapsed = document.getElementById('sidebar').classList.contains('collapsed');
            const width = collapsed 
                ? parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-collapsed'))
                : parseInt(getComputedStyle(document.documentElement).getPropertyValue('--sidebar-width'));
            
            toolbar.style.left = width + 'px';
            resizeGraphCanvas();
        }

        // Фильтрация узлов по поисковому запросу
        function filterNodes() {
            const input = document.getElementById('searchInput').value.toLowerCase().trim();
            const groups = document.querySelectorAll('.node-group');
            const cards = document.querySelectorAll('.node-card');

            // Флаг наличия совпадений
            let hasAnyMatch = false;

            groups.forEach(group => {// Проход по всем группам
                let groupHasMatch = false;
                const groupCards = group.querySelectorAll('.node-card');

                groupCards.forEach(card => {// Проверяет каждую карточку
                    const title = card.querySelector('div').textContent.toLowerCase();
                    if (title.includes(input)) {// Совпадение с поиском
                        card.style.display = 'flex';// Показывает
                        groupHasMatch = true;
                        hasAnyMatch = true;
                    } else {
                        card.style.display = 'none';// Скрывает
                    }
                });

                // Показывает/скрывает группу в зависимости от совпадений
                if (groupHasMatch) {
                    group.style.display = 'block';
                    group.classList.remove('collapsed'); // Раскрываем группу
                } else {
                    group.style.display = 'none'; // Скрываем пустую группу
                }
            });

            // Если поиск пустой — показываем все группы
            if (!input) {
                groups.forEach(group => {
                    group.style.display = 'block';
                    group.classList.add('collapsed'); // Возвращаем в свёрнутое состояние
                });
            }
        }
        
        // ===================================================================
        // === 6. ИНСПЕКТОР ===
        // ===================================================================
        function updateInspector(node) {

        // Получаем DOM-элементы панели инспектора:
        // - `inspector` — основной контейнер
        // - `preview` — область для отображения превью узла
        // - `controls` — область для элементов управления (виджетов)
        const inspector = document.getElementById('inspector');
        const preview = document.getElementById('inspector-preview');
        const controls = document.getElementById('inspector-node-controls');

        // Если панель инспектора не найдена — выходим
        if (!inspector) return;

        // Если узел не передан (null/undefined) — скрываем инспектор
        if (!node) {
            inspector.classList.remove('visible');// Убираем класс "видимый"
            return;
        }

        // Если узел есть — показываем инспектор
        inspector.classList.add('visible');

        // Очищаем превью и настройки перед обновлением
        preview.innerHTML = '';
        controls.innerHTML = '';

        // --- РАЗДЕЛ: ОТСЛЕЖИВАНИЕ ПРЕВЬЮ ---
        // Проверяем, есть ли у узла данные для превью
        if (node.properties?.previewData) {
            // Создаём временный canvas для отображения превью
            const canvas = document.createElement('canvas');
            // Устанавливаем размеры из данных узла
            canvas.width = node.properties.previewData.width;
            canvas.height = node.properties.previewData.height;
            // Настраиваем стили для адаптации под контейнер
            canvas.style.maxWidth = '100%';
            canvas.style.height = 'auto';
            // Рисуем ImageData на canvas
            canvas.getContext('2d').putImageData(node.properties.previewData, 0, 0);
            // Добавляем canvas в область превью
            preview.appendChild(canvas);


            preview.addEventListener('click', () => {
                //showLocationInfo(location);
                const modal = document.getElementById('imageModal');
                const modalImg = document.getElementById('modalImage');
                modal.style.display = 'flex';
                modal.appendChild(canvas);
            });
            // Закрытие модального окна
                document.querySelector('.close-modal').addEventListener('click', () => {
                document.getElementById('imageModal').style.display = 'none';
                // Добавляем canvas в область превью
                preview.appendChild(canvas);
            });


        } else {
            // Если превью нет — показываем текстовое уведомление
            preview.textContent = 'Нет превью123';
        }


            


        // --- РАЗДЕЛ: ОТСЛЕЖИВАНИЕ НАСТРОЕК ---
        // Проверяем, есть ли у узла настройки
        if (node.widgets) {
            // Проходим по каждому виджету
            node.widgets.forEach(widget => {

                // Создаём контейнер для виджета (div с классом "widget-prop")
                const div = document.createElement('div');
                div.className = 'widget-prop';
                // Создаём метку (label) для виджета
                const label = document.createElement('label');
                label.className = 'widget-label';
                label.textContent = widget.name;// Название виджета (например, "Яркость")
                div.appendChild(label);// Добавляем label в контейнер


                // --- ЛОГИКА ДЛЯ РАЗНЫХ ТИПов ВИДЖЕТОВ ---
                let input;// Переменная для элемента управления
                // 1. Виджет типа "ползунок" (slider)
                if (widget.type === 'slider') {
                    input = document.createElement('input');
                    input.type = 'range'; // HTML-разметка для ползунка
                    // Устанавливаем параметры ползунка (по умолчанию 0-100 с шагом 1)
                    input.min = widget.min ?? 0; // nullish coalescing: если min не задан — 0
                    input.max = widget.max ?? 100;


                    input.step = widget.step?? 1;
                    input.value = widget.value; // Текущее значение виджета
                    
                    // Обработчик изменения значения
                    input.oninput = () => {
                        // Обновляем значения в объекте виджета и свойств узла
                        widget.value = +input.value; // Унарный плюс преобразует строку в число
                        node.properties[widget.name] = +input.value;
                        // Вызываем метод выполнения узла (если есть)
                        node.onExecute?.();
                        // Помечаем граф как "грязный" для перерендеринга
                        graphCanvas.setDirty(true, true);
                    };
                }
                
                // 2. Виджет типа "числовое поле" (number)
                else if (widget.type === 'number') {

                    input = document.createElement('input');
                    input.type = 'number'; // HTML-разметка для числового ввода

                    // console.log(node);
                    // console.log(widget.options.min);

                    if(node.title == "Порог" && widget.name == "Минимум"){
                        input.min = widget.options.min;
                    }
                    else {
                        input.min = widget.min || 0; // Если min не задан — 0 (или 0 при falsy)
                    }     
                            

                    
                    input.value = widget.value; // Инициализация значением виджета
                    var temp =  widget.options.step/10;
                    input.step = temp || 0.01;  // По умолчанию 0.01 (для дробей)
                

                    // Обработчик изменения (срабатывает при потере фокуса)
                    input.onchange = () => {

                        // Обновляем значения и перезапускаем узел
                        widget.value = +input.value;
                        //const myNodes = graph.findNodesByProperty("title", node.title);
                        //console.log(myNodes);

                        node.properties[widget.name] = input.value;
                        if(widget.name == "Ширина")
                            node.setProperty("node_width", input.value);
                        if(widget.name == "Высота")
                            node.setProperty("node_height", input.value);

                        // console.log(node.properties[widget.name].value);
                        // console.log(input.value);
                        // console.log(node.properties.node_width);
                        // console.log(node.properties.node_height);
                        //node.onExecute?.();
                        graphCanvas.setDirty(true, true);
                    };
                }
                
                // 3. Виджет типа "флажок" (checkbox)
                else if (widget.type === 'checkbox') {
                    input = document.createElement('input');
                    input.type = 'checkbox'; // HTML-разметка для чекбокса
                    input.checked = !!widget.value; // Приводим значение к булевому
                    
                    // Обработчик изменения состояния
                    input.onchange = () => {
                        // Обновляем флажок и свойства узла
                        widget.value = input.checked;
                        node.properties[widget.name] = input.checked;
                        node.onExecute?.();
                        graphCanvas.setDirty(true, true);
                    };
                }
                else if (widget.type === 'toggle') {
                    input = document.createElement('input');
                    input.type = 'checkbox'; // HTML-разметка для чекбокса
                    input.checked = !!widget.value; // Приводим значение к булевому
                    
                    // Обработчик изменения состояния
                    input.onchange = () => {
                        // Обновляем флажок и свойства узла
                        widget.value = input.checked;
                        node.properties[widget.name] = input.checked;
                        node.onExecute?.();
                        graphCanvas.setDirty(true, true);
                    };
                }
                
                // 4. Виджет типа "кнопка" (button)
                else if (widget.type === 'button') {
                    input = document.createElement('button');
                    input.textContent = widget.value; // Текст кнопки берётся из значения виджета
                    // Обработчик клика (вызов callback-функции виджета)
                    input.onclick = () => widget.callback?.();
                }

                // Если элемент управления создан (input или button) — добавляем его
                if (input) div.appendChild(input);
                // Добавляем готовый блок (label + input) в панель управления
                controls.appendChild(div);
            });
        }
        }
        window.updateInspectorIfSelected = (node) => {
        if (graphCanvas.selected_nodes && Object.values(graphCanvas.selected_nodes)[0] === node) {
            updateInspector(node);
        }
        };
        graphCanvas.onNodeSelected = (node) => updateInspector(node);
        graphCanvas.onNodeDeselected = () => updateInspector(null);

        // Задержка для корректного рендеринга
        setTimeout(() => {
            resizeGraphCanvas();
            updateLayout();
        }, 500);
