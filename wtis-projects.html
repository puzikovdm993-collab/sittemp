<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Карточки проектов</title>
    <link rel="stylesheet" href="styles/wtis-projects.css">
</head>
<body>
    <svg xmlns="http://www.w3.org/2000/svg" style="display:none;" >
        <symbol id="plus"  viewBox="0 0 24 24"  stroke="#007acc" fill="#007acc"><path d="M5 12h14" /><path d="M12 5v14" /></symbol>

        <symbol id="hard-drive-upload"  viewBox="0 0 24 24"stroke="#007acc" fill="#007acc00" ><path d="m16 6-4-4-4 4" /><path d="M12 2v8" /><rect width="20" height="8" x="2" y="14" rx="2" /><path d="M6 18h.01" /><path d="M10 18h.01" /></symbol>
        <symbol id="grid-2x2"  viewBox="0 0 24 24" stroke="#007acc" fill="#007acc00"><path d="M12 3v18" /><path d="M3 12h18" /><rect x="3" y="3" width="18" height="18" rx="2" /></symbol>
        <symbol id="menu"  viewBox="0 0 24 24" stroke="#007acc"><path d="M4 5h16" /><path d="M4 12h16" /><path d="M4 19h16" /></symbol>
    </svg>

    <div class="app-layout">
        <div class="top-bar">
            <div class="user-profile-top">
                <div class="avatar-small" id="openSettingsFromTop">
                    <svg> <use href="#brain"/> </svg>   
                </div>
                <div class="user-info">
                    <div class="user-name-top" id="displayUserName"></div>
                </div>
            </div>

            <div class="top-actions">
                <!-- <button id="openCreateProjectModalBtn" class="btn-primary">+</button> -->
                <button id="openCreateProjectModalBtn" class="btn-icon" title="Создать проект">
                    <svg> <use href="#plus"/> </svg>
                </button>
                <!-- <button id="exportProjectsBtn" class="btn-icon" title="Экспорт"><svg> <use href="#hard-drive-upload"  /></svg></button> -->
                <!-- <button id="importProjectsBtn" class="btn-icon" title="Импорт" ><svg> <use href="#hard-drive-download"/></svg></button> -->
                <button id="toggleViewModeBtn" class="btn-icon" title="Переключить вид">
                    <svg> <use href="#grid-2x2"/> </svg>
                </button>
            </div>

            <div class="search-section-top">
                <div class="search-box-top"><span>🔎</span>
                    <input type="text" id="sidebarSearchInput" placeholder="Поиск..."></div>
            </div>

            <!-- Filter by Author -->
            <div class="sort-dropdown">

                <span class="sort-label">Тип:</span>
                <div class="sort-box">
                    <select id="typeFilter" title="Тип проекта">
                        <option value="all">Все проекты</option>
                    </select>
                </div>  


                <span class="sort-label">Автор:</span>
                <div class="sort-box">
                    <select id="authorFilter" title="Автор">
                        <option value="all">Все авторы</option>
                    </select>
                </div>  

                <div class="sort-box">
                    <select id="sortSelect" title="Сортировка">
                        <option value="date-desc">По дате (новые)</option>
                        <option value="date-asc">По дате (старые)</option>
                        <option value="name-asc">По алфавиту (А-Я)</option>
                        <option value="name-desc">По алфавиту (Я-А)</option>
                    </select>
                </div>
            </div>
            
                        


  
        </div>
    
        <div class="main-content">
            <div id="projectsGridMain" class="projects-grid-main"><div class="empty-projects">[ пусто ]</div></div>
        </div>
    </div>

<!-- Toast уведомления -->
<div id="toastMsg" class="toast-msg" role="alert" aria-live="assertive">
    <span class="toast-text"></span>
</div>

<!-- Модальное окно пользовательских настроек -->
<div id="userSettingsModal" class="user-settings-modal">
    <div class="user-settings-panel">
        <div class="settings-header">
            <h3>Настройки</h3>
            <button id="closeSettingsBtn" class="close-settings-btn">✕</button>
        </div>
        <div class="settings-form-group">
            <label>Пользователь</label>
            <span id="settingsUserName"></span>
        </div>
        <div class="settings-form-group">
            <label>Тема оформления</label>
            <select id="settingsUiStyle">
                <option value="dark">Тёмная</option>
                <option value="light">Светлая</option>
            </select>
        </div>
        <div class="settings-actions">
            <button id="saveSettingsBtn" class="btn-primary">Сохранить</button>
            <button id="cancelSettingsBtn" class="btn-secondary">Отмена</button>
        </div>
    </div>
</div>

<!-- Модальное окно создания проекта -->
<div id="createProjectModal" class="user-settings-modal">
    <div class="user-settings-panel">
        <div class="settings-header">
            <h3>Новый проект</h3>
            <button id="closeCreateProjectModalBtn" class="close-settings-btn">✕</button>
        </div>
        <div class="settings-form-group">
            <label>Название</label>
            <input type="text" id="newProjectName" placeholder="Название проекта ...">
        </div>
        <div class="settings-form-group">
            <label>Тип</label>
            <select id="projectType">
                <option value="tis">tis</option>
                <option value="workflow">workflow</option>
            </select>
        </div>
        <div class="settings-actions">
            <button id="createProjectModalBtn" class="btn-primary">Создать</button>
            <button id="cancelCreateProjectModalBtn" class="btn-secondary">Отмена</button>
        </div>
    </div>
</div>

<!-- Модальное окно подтверждения -->
<div id="confirmModal" class="confirm-modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <div class="confirm-panel">
        <div class="settings-header">
            <h3 id="confirmTitle">Подтверждение</h3>
            <button class="close-settings-btn" onclick="hideConfirmModal()" aria-label="Закрыть">✕</button>
        </div>
        <p class="confirm-message" id="confirmMessage">Вы уверены?</p>
        <div class="confirm-actions">
            <button class="btn-secondary" onclick="hideConfirmModal()">Отмена</button>
            <button id="confirmActionBtn" class="btn-danger">Подтвердить</button>
        </div>
    </div>
</div>

<!-- Модальное окно настроек типа TIS -->
<div id="tisSettingsModal" class="user-settings-modal" role="dialog" aria-modal="true" aria-labelledby="confirmTitle">
    <div class="user-settings-panel">
        <div class="settings-header">
            <h3>Настройки проекта TIS</h3>
            <button id="closeTisSettingsBtn" class="close-settings-btn">✕</button>
        </div>
        <div class="settings-form-group">
            <label>Тема оформления</label>
            <select id="settingsTISTheme">
                <option value="dark">🌙 Тёмная</option>
                <option value="light">☀️ Светлая</option>
            </select>
        </div>
        <div class="settings-actions">
            <button id="saveTisSettingsBtn" class="btn-primary">Сохранить</button>
            <button id="cancelTisSettingsBtn" class="btn-secondary">Отмена</button>
        </div>
    </div>
</div>

<script src="src/wtis-projects/wtis-projects.js"></script>
</body>
</html>
